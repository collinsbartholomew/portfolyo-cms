worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    access_log off;
    error_log /var/log/nginx/error.log warn;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    open_file_cache max=2000 inactive=120s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    proxy_cache_path /var/cache/nginx levels=1:2
        keys_zone=NEXTJS:50m
        max_size=500m
        inactive=120m
        use_temp_path=off;

    upstream nextjs {
        zone nextjs 64k;
        least_conn;
        server app:3000 resolve;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;
        root /srv/public;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 100m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location = /api/health {
            proxy_pass http://nextjs;
            proxy_cache off;
            add_header Cache-Control "no-store" always;
        }

        location ^~ /api/uploads/ {
            alias /srv/uploads/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
        }

        location ^~ /uploads/ {
            alias /srv/uploads/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
        }

        location ^~ /_next/static/ {
            proxy_pass http://nextjs;
            proxy_cache NEXTJS;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri";
            proxy_cache_valid 200 365d;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~* \.(?:ico|txt|xml|webmanifest|pdf|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot)$ {
            access_log off;
            try_files $uri @nextjs;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        }

        location ^~ /admin {
            proxy_pass http://nextjs;
            proxy_cache off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header Cache-Control "no-store" always;
        }

        location = /api/github/stats {
            proxy_pass http://nextjs;
            proxy_cache NEXTJS;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri";
            proxy_cache_valid 200 2m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header http_500 http_502 http_503 http_504 updating;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location = /api/gallery {
            proxy_pass http://nextjs;
            proxy_cache off;
            proxy_hide_header Cache-Control;
            proxy_hide_header CDN-Cache-Control;
            proxy_hide_header Vercel-CDN-Cache-Control;
            add_header Cache-Control "no-store" always;
        }

        location = /api/config {
            proxy_pass http://nextjs;
            proxy_cache off;
            proxy_hide_header Cache-Control;
            proxy_hide_header CDN-Cache-Control;
            proxy_hide_header Vercel-CDN-Cache-Control;
            add_header Cache-Control "no-store" always;
        }

        location = /api/blogs {
            proxy_pass http://nextjs;
            proxy_cache off;
            proxy_hide_header Cache-Control;
            proxy_hide_header CDN-Cache-Control;
            proxy_hide_header Vercel-CDN-Cache-Control;
            add_header Cache-Control "no-store" always;
        }

        location ^~ /api/ {
            proxy_pass http://nextjs;
            proxy_cache off;
            add_header Cache-Control "no-store" always;
        }

        location / {
            try_files $uri @nextjs;
        }

        location @nextjs {
            proxy_pass http://nextjs;
            proxy_cache off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
