services:
  mongo1:
    image: mongo:7
    restart: unless-stopped
    hostname: mongo1
    entrypoint:
      - sh
      - -lc
      - |
        KEYFILE=/data/configdb/keyfile
        if [ ! -f "$$KEYFILE" ]; then
          mkdir -p /data/configdb
          printf '%s' "$$MONGO_REPLICA_SET_KEY" > "$$KEYFILE"
          chmod 600 "$$KEYFILE"
        fi
        exec docker-entrypoint.sh mongod --bind_ip_all --replSet rs0 --keyFile "$$KEYFILE" --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY}
    volumes:
      - mongo1_data:/data/db
      - mongo1_config:/data/configdb
    networks:
      - aiyu-network
    mem_limit: ${MONGO_MEMORY_LIMIT:-512m}
    mem_reservation: ${MONGO_MEMORY_RESERVATION:-256m}
    cpus: ${MONGO_CPUS:-0.5}
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --host 127.0.0.1 --port 27017
          -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin --quiet --eval "db.adminCommand('ping').ok"
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo2:
    image: mongo:7
    restart: unless-stopped
    hostname: mongo2
    entrypoint:
      - sh
      - -lc
      - |
        KEYFILE=/data/configdb/keyfile
        if [ ! -f "$$KEYFILE" ]; then
          mkdir -p /data/configdb
          printf '%s' "$$MONGO_REPLICA_SET_KEY" > "$$KEYFILE"
          chmod 600 "$$KEYFILE"
        fi
        exec docker-entrypoint.sh mongod --bind_ip_all --replSet rs0 --keyFile "$$KEYFILE" --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY}
    volumes:
      - mongo2_data:/data/db
      - mongo2_config:/data/configdb
    networks:
      - aiyu-network
    mem_limit: ${MONGO_MEMORY_LIMIT:-512m}
    mem_reservation: ${MONGO_MEMORY_RESERVATION:-256m}
    cpus: ${MONGO_CPUS:-0.5}
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --host 127.0.0.1 --port 27017
          -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin --quiet --eval "db.adminCommand('ping').ok"
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo3:
    image: mongo:7
    restart: unless-stopped
    hostname: mongo3
    entrypoint:
      - sh
      - -lc
      - |
        KEYFILE=/data/configdb/keyfile
        if [ ! -f "$$KEYFILE" ]; then
          mkdir -p /data/configdb
          printf '%s' "$$MONGO_REPLICA_SET_KEY" > "$$KEYFILE"
          chmod 600 "$$KEYFILE"
        fi
        exec docker-entrypoint.sh mongod --bind_ip_all --replSet rs0 --keyFile "$$KEYFILE" --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY}
    volumes:
      - mongo3_data:/data/db
      - mongo3_config:/data/configdb
    networks:
      - aiyu-network
    mem_limit: ${MONGO_MEMORY_LIMIT:-512m}
    mem_reservation: ${MONGO_MEMORY_RESERVATION:-256m}
    cpus: ${MONGO_CPUS:-0.5}
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --host 127.0.0.1 --port 27017
          -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin --quiet --eval "db.adminCommand('ping').ok"
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-init:
    image: mongo:7
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    command:
      - sh
      - -lc
      - |
        cat <<'EOF' >/tmp/init-rs.js
        const admin = process.env.MONGO_ROOT_USERNAME;
        const password = process.env.MONGO_ROOT_PASSWORD;
        const uri = 'mongodb://' + admin + ':' + password + '@mongo1:27017/admin?authSource=admin';
        const maxAttempts = 120;
        let conn;
        let adminDb;
        const cfg = {
          _id: 'rs0',
          members: [
            { _id: 0, host: 'mongo1:27017', priority: 2 },
            { _id: 1, host: 'mongo2:27017', priority: 1 },
            { _id: 2, host: 'mongo3:27017', priority: 1 }
          ]
        };

        for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
          try {
            conn = new Mongo(uri);
            adminDb = conn.getDB('admin');

            const hello = adminDb.runCommand({ hello: 1 });
            if (hello.ok === 1 && hello.isWritablePrimary) {
              const status = adminDb.runCommand({ replSetGetStatus: 1 });
              if (status.ok === 1) {
                print('Replica set already healthy.');
                quit(0);
              }
            }

            try {
              const initiateResult = adminDb.runCommand({ replSetInitiate: cfg });
              printjson(initiateResult);
            } catch (initErr) {
              if (!String(initErr).includes('already initialized')) {
                throw initErr;
              }
            }

            const postHello = adminDb.runCommand({ hello: 1 });
            if (postHello.ok === 1 && postHello.isWritablePrimary) {
              print('Replica set initialized and primary elected.');
              quit(0);
            }
          } catch (error) {
            print('mongo-init attempt ' + attempt + '/' + maxAttempts + ': ' + String(error));
          }
          sleep(2000);
        }

        print('mongo-init timed out waiting for replica set readiness');
        quit(1);
        EOF
        mongosh --nodb /tmp/init-rs.js
    networks:
      - aiyu-network





  app:
    image: aiyuayaan/aiyu:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo1:27017,mongo2:27017,mongo3:27017/aiyu?replicaSet=rs0&authSource=admin}
      NEXT_PUBLIC_N8N_WEBHOOK_URL: ${NEXT_PUBLIC_N8N_WEBHOOK_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      SITE_URL: ${SITE_URL}
      NEXT_PUBLIC_AUTHOR_NAME: ${NEXT_PUBLIC_AUTHOR_NAME}


      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BLOG_API_KEY: ${BLOG_API_KEY}
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=256}
    volumes:
      - uploads_data:/app/public/uploads
      - nextjs_cache:/app/.next/cache
    tmpfs:
      - /tmp:noexec,nosuid,nodev,mode=1777
      - /var/tmp:noexec,nosuid,nodev,mode=1777
      - /run:noexec,nosuid,nodev,mode=755
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: ${APP_MEMORY_LIMIT:-384m}
    mem_reservation: ${APP_MEMORY_RESERVATION:-192m}
    cpus: ${APP_CPUS:-1.0}
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 150s
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - aiyu-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/srv/public:ro
      - uploads_data:/srv/uploads:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - aiyu-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo1_data:
    name: mongodb_data
    driver: local
  mongo1_config:
    name: mongodb_config
    driver: local
  mongo2_data:
    driver: local
  mongo2_config:
    driver: local
  mongo3_data:
    driver: local
  mongo3_config:
    driver: local
  nextjs_cache:
    driver: local
  uploads_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  aiyu-network:
    driver: bridge
